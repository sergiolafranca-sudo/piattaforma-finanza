name: Robot Notturno AI Universale

on:
  schedule:
    - cron: '0 2 * * *'  # Esecuzione automatica ogni notte alle 02:00 UTC
  workflow_dispatch:      # Consente l'attivazione manuale cliccando un bottone su GitHub

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codice
      uses: actions/checkout@v4  # <-- Aggiornato a v4
      
    - name: Configurazione Python
      uses: actions/setup-python@v5  # <-- Aggiornato a v5
      with:
        python-version: '3.10'
        
    - name: Installazione Librerie
      run: pip install -r requirements.txt
        
    - name: Esecuzione Scraper Universale AI
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python scraper.py
